# ══════════════════════════════════════════════════════════════════
#  docker-compose.yml — Biblioteca Distribuida
#
#  Servicos:
#    servidor-biblioteca  — nucleo concorrente (mutex + semaforo + fila/worker)
#    cliente-biblioteca   — aluga/devolve livros (sobe manualmente)
#    admin-biblioteca     — CRUD via socket TCP
#
#  Comandos principais:
#    docker compose up --build              -> sobe o servidor
#    docker compose run --rm cliente-biblioteca -> abre cliente interativo
#    docker compose run --rm admin-biblioteca   -> abre painel admin
#    python simular.py                       -> simulacao distribuida
#    docker compose down                     -> encerra tudo
# ══════════════════════════════════════════════════════════════════

services:

  servidor-biblioteca:
    build: .
    image: biblioteca/app:latest
    container_name: servidor-biblioteca
    command: python servidor.py

    networks:
      - rede-biblioteca

    volumes:
      - ./logs:/logs
      - dados-biblioteca:/app/data

    environment:
      DATA_FILE: "/app/data/biblioteca.dat"
      LOG_DIR: "/logs"

    restart: unless-stopped

  cliente-biblioteca:
    image: biblioteca/app:latest
    command: python /app/cliente.py
    profiles: ["manual"]

    networks:
      - rede-biblioteca

    volumes:
      - ./logs:/logs

    environment:
      SERVIDOR_HOST: "servidor-biblioteca"
      SERVIDOR_PORT: "8086"

    depends_on:
      - servidor-biblioteca

    stdin_open: true
    tty: true

  admin-biblioteca:
    image: biblioteca/app:latest
    command: python /app/admin.py
    profiles: ["manual"]

    networks:
      - rede-biblioteca

    volumes:
      - ./logs:/logs

    environment:
      SERVIDOR_HOST: "servidor-biblioteca"
      SERVIDOR_PORT: "8086"

    depends_on:
      - servidor-biblioteca

    stdin_open: true
    tty: true

networks:
  rede-biblioteca:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  dados-biblioteca: